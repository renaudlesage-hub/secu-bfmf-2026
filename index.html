<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Onglet du navigateur -->
    <title>Sécurité BFMF 2026</title>
    <meta name="description" content="Plateforme de sécurité du Bucolique Ferrières Musique Festival 2026 — QG et équipes terrain." />

    <!-- Couleur de la barre d'adresse (mobile) : accordée au thème sombre -->

    <meta name="apple-mobile-web-app-title" content="Sécu BFMF" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Icônes : on réutilise le logo Bucolique déjà présent (PNG du manifeste).

    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
